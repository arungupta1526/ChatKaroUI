# Project version 5.7.1 28.03.26.00.17+28 Mar 26
# The name of the extension developer.
author: Arun Gupta

# Define the minimum Android SDK API level your extension supports.
min_sdk: 14
# Define the compile Android SDK API level.
# compile_sdk: 35
# If enabled, the D8 tool will generate desugared jar (classes.dex)
desugar_dex: true
# If enabled, extension will be optimized using R8.
R8: true
# If enabled, extension will be optimized using ProGuard.
proguard: true
# Define specific ProGuard version.
# proguard_version: 7.9.0
# Enable to collect ProGuard rules from runtime AARs (premium).
# collect_rules: false
# If enabled, Kotlin Standard Libraries will be included with the extension.
# kotlin: false
# Kotlin Compiler version.
# kotlin_version: 1.9.24

# Select resolver tool between `gradle/maven` to fetch transitive dependencies.
# resolver: gradle

# Default repositories are Maven Central, Google Maven & Maven Local.
# If the library you want to use is not available in these repositories,
# add here by specifying their URLs (premium).
# repositories:
# - https://jitpack.io/

# Runtime dependencies [Remote and Local]
# dependencies:
# - groupId:artifactId:version (premium)
# - aar-library.aar
# - jar-library.jar

# Compile-time dependencies [Remote and Local]
# compile_time:
# - groupId:artifactId:version (premium)
# - aar-library.aar
# - jar-library.jar

# Define dependencies to skip during resolve. [Remote only]
# excludes:
# - groupId:artifactId:version (premium)

# Extension assets. [Should be present in assets directory]
# assets:
# - my-awesome-asset.anything

# Attach custom XML to bundle it with APK (premium).
# [Should be present in assets directory within relative child directory]
# xmls:
# - targetPath/myfile.xml

# Define AAR libraries to attach with extension. [Remote and Local] (premium)
# aars:
# - groupId:artifactId:version
# - aar-library.aar

# Enable to write docs in Markdown during build. Pass `-b` to generate blocks.
gen_docs: true
# Enable to generate blocks with shadow blocks (premium).
shadow_blocks: false
# Enable to increment the version number of each component during build.
auto_version: false
# Enable to remove @annotations from the extension.
deannonate: true
# Enable to skip matching classes provided by AI2.
filter_mit_classes: false

